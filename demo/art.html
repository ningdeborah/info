<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB 光學調色實驗室 v0.1</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #1a1a1a;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            touch-action: manipulation;
        }

        /* 上半部：實驗展示區 */
        #lab-view {
            flex: 1.5;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border-bottom: 2px solid #333;
        }

        .dark-room {
            position: relative;
            width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        /* 光束模擬 - 使用 mix-blend-mode 達成加色法 */
        .light-beam {
            position: absolute;
            width: 180px; height: 180px;
            border-radius: 50%;
            filter: blur(15px);
            mix-blend-mode: screen; /* 關鍵：模擬色光疊加 */
            transition: opacity 0.4s ease;
            opacity: 0;
        }

        #light-r { background: rgb(255, 0, 0); transform: translate(0, -40px); }
        #light-g { background: rgb(0, 255, 0); transform: translate(-40px, 40px); }
        #light-b { background: rgb(0, 0, 255); transform: translate(40px, 40px); }

        /* 任務面板 */
        #mission-card {
            position: absolute; top: 20px; left: 20px;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid #444; border-radius: 8px;
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #mission-target {
            color: #ffcc00; font-weight: bold; font-size: 1.2rem;
            text-shadow: 0 0 5px rgba(255,204,0,0.5);
        }

        /* 下半部：控制面板 */
        #control-panel {
            flex: 1;
            background: var(--panel-bg);
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        .switch-group {
            display: flex; gap: 20px; margin-top: 15px;
        }

        .switch-btn {
            width: 70px; height: 70px;
            border-radius: 12px; border: 3px solid #444;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-weight: bold; transition: all 0.2s;
            background: #222;
        }

        .switch-btn[data-color="R"].active { background: #800; border-color: #f00; box-shadow: 0 0 15px #f00; }
        .switch-btn[data-color="G"].active { background: #080; border-color: #0f0; box-shadow: 0 0 15px #0f0; }
        .switch-btn[data-color="B"].active { background: #008; border-color: #00f; box-shadow: 0 0 15px #00f; }

        #status-msg { margin-top: 20px; height: 30px; font-weight: bold; }

        /* 手機適應 */
        @media (max-width: 600px) {
            .dark-room { transform: scale(0.8); }
            .switch-btn { width: 60px; height: 60px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="lab-view">
        <div id="mission-card">
            <div style="font-size: 12px; color: #aaa; margin-bottom: 5px;">數位修復局任務：</div>
            <div id="mission-target">請調出「白色 (White)」</div>
        </div>

        <div class="dark-room">
            <div id="light-r" class="light-beam"></div>
            <div id="light-g" class="light-beam"></div>
            <div id="light-b" class="light-beam"></div>
        </div>
    </div>

    <div id="control-panel">
        <p style="font-size: 14px; color: #888;">控制雷射開關 (加色法實驗)</p>
        <div class="switch-group">
            <div class="switch-btn" data-color="R" onclick="toggleLight('R', this)">R<br>紅光</div>
            <div class="switch-btn" data-color="G" onclick="toggleLight('G', this)">G<br>綠光</div>
            <div class="switch-btn" data-color="B" onclick="toggleLight('B', this)">B<br>藍光</div>
        </div>
        <div id="status-msg"></div>
        <button onclick="nextMission()" style="margin-top: 10px; background: transparent; border: 1px solid #555; color: #888; padding: 5px 15px; border-radius: 4px; cursor: pointer;">切換下個任務</button>
    </div>

    <script>
        const state = { R: false, G: false, B: false };
        const missions = [
            { name: "黃色 (Yellow)", check: () => state.R && state.G && !state.B },
            { name: "青色 (Cyan)", check: () => !state.R && state.G && state.B },
            { name: "洋紅色 (Magenta)", check: () => state.R && !state.G && state.B },
            { name: "白色 (White)", check: () => state.R && state.G && state.B },
            { name: "紅色 (Red)", check: () => state.R && !state.G && !state.B }
        ];
        let currentMissionIndex = 0;

        function toggleLight(color, btn) {
            state[color] = !state[color];
            btn.classList.toggle('active');
            
            // 更新視覺光束
            document.getElementById(`light-${color.toLowerCase()}`).style.opacity = state[color] ? "1" : "0";
            
            checkMission();
        }

        function checkMission() {
            const mission = missions[currentMissionIndex];
            const msg = document.getElementById('status-msg');
            
            if (mission.check()) {
                msg.innerHTML = "<span style='color: #0f0;'>✓ 修復成功！色彩特徵符合。</span>";
                setTimeout(() => {
                    nextMission();
                }, 1500);
            } else {
                msg.innerText = "";
            }
        }

        function nextMission() {
            currentMissionIndex = Math.floor(Math.random() * missions.length);
            document.getElementById('mission-target').innerText = `請調出「${missions[currentMissionIndex].name}」`;
            document.getElementById('status-msg').innerText = "";
        }

        // 初始化
        window.onload = nextMission;
    </script>
</body>
</html>
