<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海城縣尋根地圖 v0.1</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* GPS 按鈕樣式 */
        .gps-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .info-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info-panel">海城縣：甯家村探訪 (v0.1)</div>
    <div id="map"></div>
    <div class="gps-button" onclick="locateUser()">📍</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. 初始化地圖：設定在海城縣附近座標
        // 座標說明：海城縣大致位置為 40.85, 122.75
        var map = L.map('map', {
            center: [40.85, 122.75],
            zoom: 13,
            zoomControl: false // 手機版建議隱藏，用手勢操作
        });

        // 2. 設定圖資 (使用 OpenStreetMap)
        // 註：離線地圖通常需要預先下載 Tile 檔案，此處使用瀏覽器快取機制
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. 標示甯家村 (座標需根據實際位置微調)
        var ningVillage = L.marker([40.88, 122.80]).addTo(map);
        ningVillage.bindPopup("<b>甯家村</b><br>拜訪每家每戶計劃起始點").openPopup();

        // 4. GPS 定位功能
        function locateUser() {
            map.locate({setView: true, maxZoom: 16});
        }

        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup("您當前在此範圍內 (" + radius.toFixed(1) + " 公尺)").openPopup();
            L.circle(e.latlng, radius).addTo(map);
        }

        function onLocationError(e) {
            alert("無法取得您的位置: " + e.message);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);

        // 5. 支援電腦與行動裝置操作
        // Leaflet 預設已支援滑鼠滾輪與雙指縮放
        L.control.zoom({ position: 'topright' }).addTo(map);

    </script>
</body>
</html>
